<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiggly Canvas</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="palettes.js" defer></script>
  <script src="canvas.js" defer></script>
</head>

<body>
  <div id="main-wrapper">
    <div id="tools-section">
      <div id="top-decoration">
        <svg width="24px" height="24px" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path

          </path>
          <circle cx="14.551" cy="25.424" r="2.5"></circle>
        </svg>
      </div>
      <div id="buttons-wrapper">
        <div class="button-group">
          <button id="wiggle-btn" class="tool-btn active" title="Toggle wiggly mode">
            <svg width="16" height="16" viewBox="0 0 19 19" xmlns="http://www.w3.org/2000/svg">
              <path id="baka-2" d="M21,11c-2.25,0-2.25,2-4.5,2s-2.25-2-4.5-2-2.25,2-4.5,2S5.25,11,3,11" fill="none"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
              <path id="baka-1" d="M3,5C5.25,5,5.25,7,7.5,7S9.75,5,12,5s2.26,2,4.51,2S18.75,5,21,5" fill="none"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
              <path id="baka-3" d="M21,17c-2.25,0-2.25,2-4.5,2s-2.25-2-4.5-2-2.25,2-4.5,2S5.25,17,3,17" fill="none"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
            </svg>
          </button>
        </div>
        <div class="button-group">
          <button id="pen-btn" class="tool-btn active" title="Pen mode">
            <svg width="16" height="16" viewBox="0 0 19 19" xmlns="http://www.w3.org/2000/svg">
              <path
                d='M12.238 5.472L3.2 14.51l-.591 2.016 1.975-.571 9.068-9.068-1.414-1.415zM13.78 3.93l1.414 1.414 1.318-1.318a.5.5 0 0 0 0-.707l-.708-.707a.5.5 0 0 0-.707 0L13.781 3.93zm3.439-2.732l.707.707a2.5 2.5 0 0 1 0 3.535L5.634 17.733l-4.22 1.22a1 1 0 0 1-1.237-1.241l1.248-4.255 12.26-12.26a2.5 2.5 0 0 1 3.535 0z' />
            </svg>
          </button>

          <button id="brush-btn" class="tool-btn" title="Brush mode">
            <svg width="16" height="16" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M14,3 L14,6 L12,6 L12,3 L10,3 L10,7 L8,7 L8,3 L6,3 L6,9 L18,9 L18,3 L14,3 Z M4,9 L4,1 L20,1 L20,9 L20.0000198,10.0000198 C20,11.5000033 20,11.5000033 19.9999835,12.9942495 C20.0087372,14.516482 19.1594249,14.9983131 16.7913579,15.7079171 C15.4033862,16.1238306 15,16.3523073 15,16.5 C15,17.2676064 15.0702864,17.7830399 15.2201425,18.3824644 C15.1911605,18.2665365 15.361966,18.9269843 15.3996774,19.1029709 C15.4660007,19.4124795 15.5,19.6941881 15.5,20 C15.5,21.6608656 13.9376765,23 12,23 C10.0623234,23 8.5,21.6608658 8.5,20 C8.5,19.6941881 8.53399931,19.4124795 8.60032259,19.1029709 C8.638034,18.9269843 8.80883947,18.2665365 8.7798575,18.3824644 C8.92971361,17.7830399 9,17.2676064 9,16.5 C9,16.3513074 8.5977122,16.1233443 7.21265211,15.7078263 C4.8477122,14.9983443 4,14.5179741 4,13 L4,9 Z M6,11 L6,13 C6,13.1486926 6.4022878,13.3766557 7.78734789,13.7921737 C10.1522878,14.5016557 11,14.9820259 11,16.5 C11,17.4407269 10.9077864,18.1169601 10.7201425,18.8675356 C10.7380355,18.7959635 10.5833202,19.3941962 10.5559274,19.5220291 C10.5173987,19.7018297 10.5,19.8459905 10.5,20 C10.5,20.4819917 11.1043431,21 12,21 C12.8956568,21 13.5,20.4819915 13.5,20 C13.5,19.8459905 13.4826013,19.7018297 13.4440726,19.5220291 C13.4166798,19.3941962 13.2619645,18.7959635 13.2798575,18.8675356 C13.0922136,18.1169601 13,17.4407269 13,16.5 C13,14.9826981 13.8492981,14.5016584 16.2129647,13.7933724 L16.2172679,13.7920829 C17.6004668,13.3775999 18.0008487,13.1504556 18,13 C18,11.9351632 18,11.626243 18.0000071,11 L6,11 Z" />
            </svg>
          </button>

          <button id="eraser-btn" class="tool-btn" title="Eraser mode">
            <svg width="16" height="16" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M31.293,13.293l-9-9C22.105,4.105,21.851,4,21.586,4h-3.172c-0.265,0-0.52,0.105-0.707,0.293 l-17,17c-0.391,0.391-0.391,1.024,0,1.414L8,30h8l15.293-15.293C31.683,14.317,31.683,13.683,31.293,13.293z M15.172,28H8.828l-6-6 l6.998-6.998h2.465l-6.494,6.494c-0.195,0.195-0.195,0.512,0,0.707l4,4c0.098,0.098,0.226,0.146,0.354,0.146 s0.256-0.049,0.354-0.146c0.195-0.195,0.195-0.512,0-0.707L6.857,21.85l6.643-6.643l7.232,7.232L15.172,28z M21.439,21.732 L14.207,14.5l6.146-6.146c0.195-0.195,0.195-0.512,0-0.707s-0.512-0.195-0.707,0l-6.355,6.355h-2.465L18.828,6h2.343l8,8 L21.439,21.732z" />
            </svg>
          </button>
        </div>

        <div class="button-group">
          <button id="undo-btn" class="tool-btn" title="Undo last stroke">
            <svg width="16" height="16" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
              <path fill="none" stroke-width="2" stroke-miterlimit="10" d="M5.4,14H21c3.3,0,6,2.7,6,6v7" />
              <polyline fill="none" stroke-width="2" stroke-miterlimit="10" points="13.5,6 5.5,14 13.5,22 " />
            </svg>
          </button>
          <button id="nuke-btn" class="tool-btn" title="Clear everything">
            <svg width="16" height="16" viewBox="0 0 256 200" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M215.99609,48h-176a12,12,0,0,0,0,24h4V208a20.0226,20.0226,0,0,0,20,20h128a20.0226,20.0226,0,0,0,20-20V72h4a12,12,0,0,0,0-24Zm-28,156h-120V72h120ZM76,20A12,12,0,0,1,88,8h80a12,12,0,0,1,0,24H88A12,12,0,0,1,76,20Z" />
            </svg>
          </button>
        </div>

        <div class="separator"></div>

        <div class="button-group width-group">
          <button id="width-1" class="size-btn" title="Small size">
            <div id="width-indicator-1"></div>
          </button>
          <button id="width-2" class="size-btn active" title="Medium size">
            <div id="width-indicator-2"></div>
          </button>
          <button id="width-3" class="size-btn" title="Large size">
            <div id="width-indicator-3"></div>
          </button>
          <button id="width-4" class="size-btn" title="Extra large size" style="display: none">
            <div id="width-indicator-4"></div>
          </button>
          <button id="width-5" class="size-btn" title="XXL size" style="display: none">
            <div id="width-indicator-5"></div>
          </button>
        </div>

        <div class="separator"></div>

        
        <button id="export-btn" title="Export drawing" class="tool-btn">
          <svg width="16px" height="16px" viewBox="0 0 23 23" id="diskette" data-name="Flat Color" xmlns="http://www.w3.org/2000/svg" class="icon flat-color">
            <path id="primary" d="M20.71,6.29l-4-4A1,1,0,0,0,16,2H5A2,2,0,0,0,3,4V20a2,2,0,0,0,2,2H19a2,2,0,0,0,2-2V7A1,1,0,0,0,20.71,6.29Z"></path>
            <path id="secondary" d="M8,5V2h8V5a1,1,0,0,1-1,1H9A1,1,0,0,1,8,5Zm8,9H8a1,1,0,0,0-1,1v7H17V15A1,1,0,0,0,16,14Z"></path></svg>
        </button>
      </div>
    </div>

    <div id="header-section">
      <input id="header-title" value="untitled" title="Change title"></input>
    </div>

    <div id="canvas-section">
      <canvas id="main-canvas" width="800" height="600"></canvas>
    </div>

    <div id="bottom-section">


      <div id="colors-wrapper">
              <button id="palette-btn" title="Change color palette" >
      <svg width="32px" height="32px" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path id="palette-svg" d="M26.6,6H27c8.1,0,15,5.5,15,12S40.4,29,28,29c-3.8,0-5.8,2.2-6.4,4.3a5.5,5.5,0,0,0,2.3,6.1c1,.6,1,1.3.9,1.7a1.2,1.2,0,0,1-1.3.9C11.4,42,6,33,6,24S15.2,6,26.5,6h.1m-.1-4C13,2,2,11.8,2,24s8,22,21.5,22C29,46,31,39,26,36c-.9-.6-1-3,2-3,9,0,18-3,18-15C46,9,37,2,27,2Z"/>
        <path id="palette-svg-primary" d="M21,10a3,3,0,1,0,3,3,2.9,2.9,0,0,0-3-3Z"/>
        <path id="palette-svg-secondary" d="M14,15a3,3,0,1,0,3,3,2.9,2.9,0,0,0-3-3Z"/>
        <path id="palette-svg-tertiary" d="M29,9a3,3,0,1,0,3,3,2.9,2.9,0,0,0-3-3Z"/>
      </svg>
      </button>

          <div class="button-group">
          <button id="primary-color" class="color-btn"></button>
          <button id="secondary-color" class="color-btn"></button>
          <button id="tertiary-color" class="color-btn"></button>
        </div>
        </div>
    </div>
  </div>

  <div id="palette-modal" style="display: none;">
    <div id="palette-modal-content">
      <div id="palette-modal-header">
        <h2>Select Palette</h2>
        <button id="palette-modal-close">&times;</button>
      </div>

      <div class="palette-modal-body">
        <div id="palette-list"></div>

        <div id="palette-editor">
          <h3 id="palette-editor-title">Customize Palette</h3>

          <div class="palette-color-input">
            <label>Background:</label>
            <input type="text" class="color-input" id="palette-bg-input-text" maxlength="7" pattern="#[0-9a-fA-F]{6}"  /> 
            <input type="color" id="palette-bg-input" />
          </div>

          <div class="palette-color-input">
            <label>Foreground:</label>
            <input type="text" class="color-input" id="palette-fg-input-text" maxlength="7" pattern="#[0-9a-fA-F]{6}"  /> 
            <input type="color" id="palette-fg-input" />
          </div>

          <div class="palette-color-input">
            <label>Primary:</label>
            <input type="text" class="color-input" id="palette-primary-input-text" maxlength="7" pattern="#[0-9a-fA-F]{6}"  /> 
            <input type="color" id="palette-primary-input" />
          </div>

          <div class="palette-color-input">
            <label>Secondary:</label>
            <input type="text" class="color-input" id="palette-secondary-input-text" maxlength="7" pattern="#[0-9a-fA-F]{6}"  /> 
            <input type="color" id="palette-secondary-input" />
          </div>

          <div class="palette-color-input">
            <label>Tertiary:</label>
            <input type="text" class="color-input" id="palette-tertiary-input-text" maxlength="7" pattern="#[0-9a-fA-F]{6}"  /> 
            <input type="color" id="palette-tertiary-input" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="export-modal" style="display: none;">
  <div id="export-modal-content">
    <div id="export-modal-header">
      <h2>Export</h2>
      <button id="export-modal-close">&times;</button>
    </div>

    <div id="export-modal-body">
      <div class="export-option">
        <label>
          <input type="checkbox" id="export-static" />
          Static Image (PNG)
        </label>
      </div>

      <div class="export-option">
        <label>
          <input type="checkbox" id="export-transparent" />
          Transparent Background
        </label>
      </div>

      <div class="export-filename">
        <label for="export-filename-input">Filename:</label>
        <input type="text" id="export-filename-input" placeholder="Enter filename" />
      </div>

      <div class="export-buttons">
        <button id="export-do-btn" class="export-action-btn">Export as GIF</button>
        <button id="export-cancel-btn" class="export-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
